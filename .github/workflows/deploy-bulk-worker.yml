name: Deploy hrumbles-bulk-worker

# Triggers on any push to main that touches the bulk worker source files.
# Uses the SAME GitHub secrets as your existing CI/CD pipeline.

on:
  push:
    branches: [main]
    paths:
      - 'hrumbles-bulk-worker/**'
      - '.github/workflows/deploy-bulk-worker.yml'
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  build-and-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Docker meta (tags + labels) ──────────────────────────────────────
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/hrumbles-bulk-worker
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 3. Set up QEMU + Buildx ─────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Login to Docker Hub ──────────────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Build & Push ─────────────────────────────────────────────────────
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./hrumbles-bulk-worker
          file:    ./hrumbles-bulk-worker/Dockerfile
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── 6. Deploy to Hostinger VPS ─────────────────────────────────────────
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.SERVER_HOST }}
          username:    ${{ secrets.SERVER_USERNAME }}
          key:         ${{ secrets.SSH_PRIVATE_KEY }}
          timeout:     120s
          script: |
            set -e

            CONTAINER="hrumbles-bulk-worker"
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/hrumbles-bulk-worker:latest"
            NETWORK="resume-parser-network"
            APP_DIR="/opt/hrumbles-bulk-worker"

            echo ">>> Pulling $IMAGE"
            docker pull "$IMAGE"

            echo ">>> Stopping old container"
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm   "$CONTAINER" 2>/dev/null || true

            echo ">>> Starting new container"
            docker run -d \
              --name "$CONTAINER" \
              --network "$NETWORK" \
              --restart unless-stopped \
              --env-file "$APP_DIR/.env" \
              --memory 512m \
              --memory-swap 768m \
              --cpus 1.0 \
              "$IMAGE"

            echo ">>> Waiting 10s..."
            sleep 10

            echo ">>> Health check"
            docker exec "$CONTAINER" curl -sf http://localhost:5010/health || {
              echo "HEALTH CHECK FAILED"
              docker logs --tail 80 "$CONTAINER"
              exit 1
            }

            echo ">>> Cleaning up old images"
            docker image prune -f --filter "until=24h"

            echo ">>> Deploy OK: $(docker ps --filter name=$CONTAINER --format '{{.Status}}')"